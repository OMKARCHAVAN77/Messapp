<!-- profile.component.html -->
<div class="header">
    <h4>Feedback</h4>
    <button class="logout-btn" (click)="onLogoutButton()">Log Out</button>
  </div>
<div class="feedback-container">
    <mat-card *ngFor="let feedback of myFeedBack" class="feedback-card">
      <mat-card-header>
        <div mat-card-avatar class="rating-avatar" [ngClass]="getRatingColor(feedback.rating)">
          <span class="rating-number">{{feedback.rating}}</span>
        </div>
        <mat-card-title>
          <div class="star-rating">
            <span *ngFor="let star of getStars(feedback.rating); let i = index" 
                  [class.filled]="star" 
                  [class.unfilled]="!star">
              ★
            </span>
          </div>
          <span class="rating-value">{{feedback.rating}}/5.0</span>
        </mat-card-title>
        <mat-card-subtitle  class="my-3 text-info">
          {{feedback.feedback}}
        </mat-card-subtitle>
      </mat-card-header>
      
      <mat-card-content>
        <p class="d-flex justify-content-space-between align-item-center">
          <i class="fa fa-user customerId" aria-hidden="true"></i>
          <strong>Customer ID:</strong> 
          {{feedback.customerUserId}}
        </p>
        <p><strong>Date:</strong> {{feedback.updatedAt | date: 'MMM d, y'}}</p>
      </mat-card-content>
    </mat-card>
  </div>
